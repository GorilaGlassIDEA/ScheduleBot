# имя задано явно: папка называется кириллицей («бот»),
# а compose не может вывести из неё имя проекта
name: schedulebot

services:
  bot:
    build: .
    restart: unless-stopped
    environment:
      BOT_TOKEN_FILE: /run/secrets/bot_token
    secrets:
      - bot_token
    volumes:
      # именованный том, а не ./data: у bind-mount владелец root,
      # и непривилегированный appuser не может в него писать
      - botdata:/app/data

secrets:
  bot_token:
    file: ./secrets/bot_token

volumes:
  botdata:
