# имя задано явно: папка называется кириллицей («бот»),
# а compose не может вывести из неё имя проекта
name: schedulebot

services:
  bot:
    build: .
    restart: unless-stopped
    environment:
      BOT_TOKEN_FILE: /run/secrets/bot_token
    secrets:
      - bot_token
    volumes:
      - ./data:/app/data

secrets:
  bot_token:
    file: ./secrets/bot_token
